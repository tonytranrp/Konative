name: Desktop tests

# ARCHITECTURE.md repeatedly refers to things as "verified in CI" (e.g. section 4's GLM
# packed/aligned-type question) - this is the first real CI that exists to do that verifying.
# Desktop-only: the desktop-debug preset (BUILDING.md) needs no Android/Kotlin toolchain, unlike
# the Android presets, which normally depend on machine-local paths in the gitignored
# CMakeUserPresets.json. See android-build.yml (same directory) for the real, separate setup work
# that builds the Android presets in CI instead - a real SDK/NDK/kotlinc download plus
# tools/kotlin-classpath-resolver/ standing in for CMakeUserPresets.json's machine-local paths.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # CPM.cmake's own real caching mechanism (cmake/CPM.cmake, CPM_SOURCE_CACHE) - the idiomatic
      # way to skip re-cloning ~11 dependencies (EnTT, GLM, Taskflow, BS::thread_pool,
      # concurrentqueue, readerwriterqueue, libcoro, cereal, doctest, PicoSHA2, glaze) on every run,
      # rather than hand-caching build/desktop-debug/_deps directly (tied to FetchContent's own
      # internal structure, less portable across cache restores).
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install a pinned, modern CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "^1.11.0"

      - name: Cache CPM dependency sources
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          # Keyed on the exact dependency pins, not just their existence - a version bump or a new
          # dependency correctly invalidates the cache instead of silently reusing stale sources.
          key: cpm-cache-${{ runner.os }}-${{ hashFiles('cmake/modules/KonativeDependencies.cmake') }}
          restore-keys: |
            cpm-cache-${{ runner.os }}-

      - name: Configure (desktop-debug preset)
        run: cmake --preset desktop-debug

      - name: Build everything desktop-debug configures (tests + examples)
        # No --target: the default build covers konative_tests AND examples/minimal_triangle
        # (KONATIVE_BUILD_EXAMPLES defaults on for a top-level configure) - examples/README.md's own
        # Hard Rule says examples must build on desktop specifically to be "a fast, CI-friendly smoke
        # test," which a --target konative_tests-only build was silently not actually providing.
        run: cmake --build build/desktop-debug

      - name: Run the desktop test suite
        run: ./build/desktop-debug/tests/konative_tests

      - name: Run the minimal_triangle example (smoke test - it should just start/tick/destroy cleanly)
        run: ./build/desktop-debug/examples/minimal_triangle/konative_minimal_triangle
