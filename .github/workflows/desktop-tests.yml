name: Desktop tests

# ARCHITECTURE.md repeatedly refers to things as "verified in CI" (e.g. section 4's GLM
# packed/aligned-type question) - this is the first real CI that exists to do that verifying.
# Desktop-only: the desktop-debug preset (BUILDING.md) needs no Android/Kotlin toolchain, unlike
# the Android presets, which depend on machine-local paths in the gitignored
# CMakeUserPresets.json and are out of scope for a hosted runner without real, separate setup work.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install a pinned, modern CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "^1.11.0"

      - name: Configure (desktop-debug preset)
        run: cmake --preset desktop-debug

      - name: Build konative_tests
        run: cmake --build build/desktop-debug --target konative_tests

      - name: Run the desktop test suite
        run: ./build/desktop-debug/tests/konative_tests
