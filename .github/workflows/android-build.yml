name: Android build

# Closes the gap desktop-tests.yml's own top comment used to describe: "the Android presets ...
# depend on machine-local paths in the gitignored CMakeUserPresets.json and are out of scope for a
# hosted runner without real, separate setup work." This workflow IS that setup work - it builds the
# real konative_app_native .so via the exact kotlinc+aapt2+r8+CMake+NDK pipeline ARCHITECTURE.md
# section 6.6/6.7 documents, real Android SDK/NDK/kotlinc downloaded fresh each run (not assumed
# pre-installed on the runner image), and tools/kotlin-classpath-resolver/ (see that folder's own
# README.md) resolving the AndroidX/Compose/coroutines classpath instead of a hand-assembled,
# machine-local one.
#
# Two independent jobs. `android-build` (below) matrix-builds the .so for both ABIs and proves it
# LINKS - a purely static check that was, until now, this file's whole scope ("Build-only... no
# emulator/instrumented-test step here" used to be the literal claim right here). `android-emulator-
# verify` closes that exact gap: it builds the real testapp/ APK via Gradle, installs+launches it on
# a real, hardware-accelerated emulator, and fails the job if the app crashes on startup or if any of
# its real on-device self-checks (jni_onload.cpp's on_started()) report FAILED in logcat. This is the
# one check that would have automatically caught this project's worst bug to date - a device-rotation
# crash that shipped silently for a full session because no CI step ever actually ran the app (see
# the project-konative-autonomous-loop memory entry / git history for the full writeup) - instead of
# depending on a human remembering to exercise the app for real on a connected device.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        preset: [android-arm64, android-x86_64]
    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
      # Pinned to the exact version embedded_kotlin/README.md's own hard-won bug-fix history was
      # found and fixed against (confirmed identical to this machine's own local kotlinc via
      # kotlinc/build.txt: "2.4.0-release-281") - not the latest available, deliberately, same
      # reasoning as tools/kotlin-classpath-resolver/build.gradle.kts's own dependency-version pins.
      KOTLIN_VERSION: "2.4.0"
      # Same NDK "r28" family as this project's own proven-working CMakeUserPresets.json entries
      # (android-ndk-r28, machine-local/gitignored) - a specific version, not "whatever's on the
      # runner today", so this build stays reproducible as the runner image evolves. nttld/setup-ndk
      # expects the classic "rXXy" release-name format (confirmed via its own README examples,
      # e.g. r27d), NOT the numeric major.minor.build form (e.g. 28.2.13676358) sdkmanager/Android
      # Studio use for side-by-side NDK installs - r28c is the latest real, currently-published r28
      # point release (verified: dl.google.com/.../android-ndk-r28c-linux.zip is a real 200; r28a
      # was never published, a real 404 - Google's own naming skipped straight to r28b).
      NDK_VERSION: "r28c"
      # Pinned explicitly and passed straight through to the Configure step below (KONATIVE_ANDROID_JAR/
      # KONATIVE_AAPT2), rather than leaving KonativeEmbedKotlinDex.cmake's own $ANDROID_HOME-based
      # auto-discovery to pick "whatever's newest on the runner" - a real, previously-latent bug found
      # this way (2026-07-22): the runner's own pre-installed SDK offers a newer "android-37.1"
      # platform auto-discovery correctly ranks above "36" by natural sort, but
      # KonativeCompileKotlinDex.cmake's target-API-level parser didn't yet handle a non-integer
      # platform suffix (fixed separately) - and more generally, a CI gate's whole job is being a
      # deterministic, reproducible check, which "whatever the runner happens to also have installed
      # today" works against. Auto-discovery itself stays as-is for local dev, where "pick the newest
      # on this machine" is exactly the right, low-friction behavior.
      SDK_PLATFORM: "36"
      SDK_BUILD_TOOLS: "36.0.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install a pinned, modern CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "^1.11.0"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (platform 36, build-tools 36.0.0)
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-${{ env.SDK_PLATFORM }} build-tools;${{ env.SDK_BUILD_TOOLS }}"

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Point ANDROID_NDK_HOME at the installed NDK
        # CMakePresets.json's android-arm64/android-x86_64 presets read this as a real environment
        # variable via CMake's own $env{} preset macro (matching CMakeUserPresets.json's local
        # "environment" block) - NOT a -D cache variable, so it must land in GITHUB_ENV, not the
        # configure step's command line.
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Download and verify the real kotlinc distribution (bundles the Compose compiler plugin)
        # KonativeEmbedKotlinDex.cmake derives KONATIVE_COMPOSE_PLUGIN/KONATIVE_KOTLIN_STDLIB_JAR
        # from KONATIVE_KOTLINC's own directory (<bin-dir>/../lib/*.jar) with a real existence
        # check + FATAL_ERROR if missing - only KONATIVE_KOTLINC itself needs setting here.
        # Wrapped in nick-fields/retry (a real, verified-current action, not a guess) - a real gap
        # found by a self-audit (2026-07-22): neither this download nor the Gradle resolve step
        # below had any resilience against a transient network blip against GitHub's release CDN -
        # a single flaky moment would fail the whole ~30min job outright with a raw curl/sha256sum
        # error, needing a human to notice and manually re-run.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            curl -fsSL -o kotlin-compiler.zip "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
            curl -fsSL -o kotlin-compiler.zip.sha256 "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip.sha256"
            echo "$(cat kotlin-compiler.zip.sha256)  kotlin-compiler.zip" | sha256sum -c -
            unzip -q kotlin-compiler.zip
            echo "KONATIVE_KOTLINC=$PWD/kotlinc/bin/kotlinc" >> "$GITHUB_ENV"

      - name: Cache CPM dependency sources
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-cache-${{ runner.os }}-${{ hashFiles('cmake/modules/KonativeDependencies.cmake') }}
          restore-keys: |
            cpm-cache-${{ runner.os }}-

      - name: Set up Gradle (wrapper/dependency caching for the resolver below)
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve the Kotlin/AndroidX classpath (tools/kotlin-classpath-resolver/)
        # Retry-wrapped for the same real reason as the kotlinc download above - this step does
        # real Maven dependency resolution against google()/mavenCentral(), a second genuine
        # network-dependent point of failure. nick-fields/retry has no working-directory input of
        # its own (checked directly against its real action.yml), so the cd happens inside the
        # command string instead of the usual step-level key.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            cd tools/kotlin-classpath-resolver
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            ./gradlew resolveKonativeClasspath --no-daemon

      - name: Configure (${{ matrix.preset }})
        # KONATIVE_ANDROID_JAR/KONATIVE_AAPT2 pinned explicitly (see the env block's own comment) -
        # KONATIVE_R8/KONATIVE_JAVAC still left to auto-discovery, since neither hit any real issue
        # here and their exact install-directory naming (e.g. cmdline-tools/20.0/) isn't controlled
        # by the packages: input above the way platforms;/build-tools; are.
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DKONATIVE_KOTLINC="$KONATIVE_KOTLINC" \
            -DKONATIVE_ANDROID_JAR="$ANDROID_HOME/platforms/android-$SDK_PLATFORM/android.jar" \
            -DKONATIVE_AAPT2="$ANDROID_HOME/build-tools/$SDK_BUILD_TOOLS/aapt2" \
            -DKONATIVE_KOTLIN_CLASSPATH_DIR="$GITHUB_WORKSPACE/tools/kotlin-classpath-resolver/resolved-output/kotlin-classpath" \
            -DKONATIVE_AAPT2_AAR_DIR="$GITHUB_WORKSPACE/tools/kotlin-classpath-resolver/resolved-output/aapt2-aars"

      - name: Build konative_app_native
        run: cmake --build build/${{ matrix.preset }} --target konative_app_native

      - name: Verify the real .so was produced
        run: |
          SO_PATH="build/${{ matrix.preset }}/src/platform/android/libkonative_app_native.so"
          test -s "$SO_PATH"
          file "$SO_PATH"

  android-emulator-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
      KOTLIN_VERSION: "2.4.0"
      # Build-time SDK (compileSdk=36 in testapp/app/build.gradle.kts) - independent of which API
      # level the emulator itself runs (below). A higher compileSdk than the emulator's runtime API
      # is normal, supported Android practice as long as the runtime API falls within
      # [minSdk, targetSdk] (26..36 here).
      SDK_PLATFORM: "36"
      SDK_BUILD_TOOLS: "36.0.0"
      # testapp/app/build.gradle.kts declares this EXACT NDK revision as its own ndkVersion (its own
      # comment: "matches CMakePresets.json's own android-* presets"), and AGP hard-validates the two
      # against each other - [CXX1100] "android.ndkVersion is X but android.ndkPath ... refers to a
      # different version Y" is a real, fatal configure-time error, not a warning, if they disagree
      # even within the same r28 family (confirmed via a real first CI run: nttld/setup-ndk's own
      # "r28c" resolves to 28.2.13676358, NOT this value - a genuine mismatch invisible on this
      # project's own dev machine, which happens to already have exactly 28.0.13004108 installed).
      # Pre-installing this exact package via setup-android below (pre-licensed, same mechanism as
      # platforms;/build-tools; already use) and leaving konativeNdkPath unset lets AGP find and use
      # it via its own ordinary SDK-managed-NDK discovery - no separate NDK-setup action needed for
      # this job (unlike the sibling android-build job's standalone `cmake --preset` flow, which
      # genuinely does need ANDROID_NDK_HOME as a real env var for CMakePresets.json's own $env{}
      # macro - a different mechanism this Gradle-driven job doesn't use at all).
      NDK_VERSION: "28.0.13004108"
      # Matches the API level already verified end-to-end on the local, physically-tested LDPlayer
      # x86_64 emulator (see the project-konative-testapp memory entry) - a known-good combination,
      # not a guess at what the hosted runner's own emulator images support.
      EMULATOR_API_LEVEL: 34
    steps:
      - uses: actions/checkout@v4

      # Hardware acceleration for the emulator - without this it's too slow to boot inside any
      # reasonable job timeout on a Linux runner. GitHub-hosted Linux runners do expose /dev/kvm;
      # this is the standard, well-documented recipe from reactivecircus/android-emulator-runner's
      # own README, not a project-specific workaround.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install a pinned, modern CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"
          ninjaVersion: "^1.11.0"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (platform ${{ env.SDK_PLATFORM }}, build-tools ${{ env.SDK_BUILD_TOOLS }}, NDK ${{ env.NDK_VERSION }})
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-${{ env.SDK_PLATFORM }} build-tools;${{ env.SDK_BUILD_TOOLS }} ndk;${{ env.NDK_VERSION }}"

      - name: Download and verify the real kotlinc distribution
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            curl -fsSL -o kotlin-compiler.zip "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
            curl -fsSL -o kotlin-compiler.zip.sha256 "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip.sha256"
            echo "$(cat kotlin-compiler.zip.sha256)  kotlin-compiler.zip" | sha256sum -c -
            unzip -q kotlin-compiler.zip
            echo "KONATIVE_KOTLINC=$PWD/kotlinc/bin/kotlinc" >> "$GITHUB_ENV"

      - name: Cache CPM dependency sources
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-cache-${{ runner.os }}-${{ hashFiles('cmake/modules/KonativeDependencies.cmake') }}
          restore-keys: |
            cpm-cache-${{ runner.os }}-

      - name: Set up Gradle (wrapper/dependency caching for both the resolver and testapp/ builds below)
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve the Kotlin/AndroidX classpath (tools/kotlin-classpath-resolver/)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            cd tools/kotlin-classpath-resolver
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            ./gradlew resolveKonativeClasspath --no-daemon

      - name: Build the real testapp/ debug APK via Gradle
        # Mirrors testapp/README.md's own documented recipe exactly, EXCEPT konativeNdkPath is
        # deliberately left unset here (unlike a human's own machine-local override) - the exact
        # matching NDK is now pre-installed via setup-android's own packages: list above (see this
        # job's own NDK_VERSION comment for the real [CXX1100] failure this avoids), so AGP's
        # ordinary SDK-managed-NDK discovery finds it on its own, no override needed on a runner
        # whose SDK directory (unlike this project's own dev machine) isn't admin-only/read-only.
        # konativeR8/konativeJavac are left to KonativeEmbedKotlinDex.cmake's own auto-discovery,
        # same as android-build - neither has ever hit a real issue needing an explicit pin.
        run: |
          cd testapp
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleDebug --no-daemon \
            -PkonativeKotlinc="$KONATIVE_KOTLINC" \
            -PkonativeAndroidJar="$ANDROID_HOME/platforms/android-$SDK_PLATFORM/android.jar" \
            -PkonativeAapt2="$ANDROID_HOME/build-tools/$SDK_BUILD_TOOLS/aapt2" \
            -PkonativeKotlinClasspathDir="$GITHUB_WORKSPACE/tools/kotlin-classpath-resolver/resolved-output/kotlin-classpath" \
            -PkonativeAapt2AarDir="$GITHUB_WORKSPACE/tools/kotlin-classpath-resolver/resolved-output/aapt2-aars"

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.EMULATOR_API_LEVEL }}

      # Standard reactivecircus/android-emulator-runner two-step pattern: boot once with animations
      # enabled to let the home screen fully settle, snapshot it, then cache the snapshot so every
      # future run boots from it instead of a cold start. disable-animations is false here
      # specifically (per the action's own README) so the cached snapshot captures a settled state.
      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.EMULATOR_API_LEVEL }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # The real verification step: install the real APK, launch the real MainActivity, then check
      # real logcat output for either of the two ways a startup can genuinely fail - a crash, or a
      # reported self-check failure. The actual logic lives in .github/scripts/verify-emulator-run.sh,
      # invoked as a real script file rather than inline here - a real first CI run found
      # reactivecircus/android-emulator-runner does NOT execute a multi-line `script:` value as one
      # shell script the way an ordinary `run: |` step does; it runs each line as its own
      # independent `sh -c` call, breaking both multi-line if/fi control flow and cross-line shell
      # variable persistence (see that script's own top comment for the exact failure that proved
      # this). A single `bash <file>` invocation sidesteps the whole quirk.
      - name: Install + launch the real APK on a hardware-accelerated emulator, verify a clean startup
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.EMULATOR_API_LEVEL }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash "$GITHUB_WORKSPACE/.github/scripts/verify-emulator-run.sh"

      - name: Upload logcat + screenshot as evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-verify-evidence
          path: |
            logcat.txt
            konative_emulator_screenshot.png
          if-no-files-found: warn
